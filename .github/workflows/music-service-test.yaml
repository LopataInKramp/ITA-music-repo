name: Music Service Tests

on:
  push:

jobs:
  test-music-service:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: music-service/WorkerService1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore WorkerService1.sln

      - name: Build
        run: dotnet build WorkerService1.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test WorkerService1.sln --configuration Release --no-build --verbosity normal
